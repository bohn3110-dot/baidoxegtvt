<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập - Hệ Thống Bãi Đỗ Xe Thông Minh</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { 
      margin: 0; 
      padding: 0; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background: #f0f2f5; 
      color: #1c1e21; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
    }
    
    .container { 
      width: 95%; 
      max-width: 400px; 
      background: #ffffff; 
      border-radius: 20px; 
      padding: 40px; 
      border: 1px solid #dddfe2; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      text-align: center;
    }
    
    .header h1 { 
      font-size: 30px; 
      text-transform: uppercase; 
      background: linear-gradient(to right, #0561da, #1f6feb); 
      background-clip: text; 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
      margin: 0 0 10px 0; 
    }
    .header p { color: #65676b; font-weight: 500; margin-bottom: 30px; font-size: 14px; }
    
    .input-group {
      position: relative;
      margin-bottom: 20px;
      text-align: left;
    }

    /* Hiệu ứng ẩn/hiện mượt mà cho ô Nhập lại mật khẩu */
    #re-password-group {
      display: none;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      color: #65676b;
      margin-bottom: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e4e6eb;
      border-radius: 10px;
      font-size: 16px;
      box-sizing: border-box;
      transition: all 0.3s ease;
      background: #f8f9fa;
    }

    .input-group input:focus {
      border-color: #1f6feb;
      outline: none;
      background: #ffffff;
    }

    .toggle-password {
      position: absolute;
      right: 15px;
      top: 38px;
      cursor: pointer;
      color: #8b949e;
      font-size: 18px;
      transition: color 0.3s ease;
    }

    .btn-action {
      width: 100%;
      padding: 14px;
      background: linear-gradient(to right, #0561da, #1f6feb);
      border: none;
      color: white;
      font-size: 16px;
      font-weight: 700;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      margin-top: 10px;
    }

    .btn-action:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(31, 111, 235, 0.3);
    }

    .footer-text {
      margin-top: 25px;
      font-size: 14px;
      color: #65676b;
    }

    .footer-text a {
      color: #0561da;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1 id="form-title">Đăng Nhập</h1>
    <p id="sub-title">Chào mừng bạn đến với hệ thống</p>
  </div>

  <div class="auth-form">
    <!-- Tài khoản -->
    <div class="input-group">
      <label>Tên đăng nhập</label>
      <input type="text" id="username" placeholder="Tên của bạn...">
    </div>

    <!-- Mật khẩu -->
    <div class="input-group">
      <label>Mật khẩu</label>
      <input type="password" id="password" placeholder="••••••••">
      <i class="fa-solid fa-eye toggle-password" onclick="toggleView('password', this)"></i>
    </div>

    <!-- Nhập lại mật khẩu (Mặc định ẩn) -->
    <div class="input-group" id="re-password-group">
      <label>Nhập lại mật khẩu</label>
      <input type="password" id="re-password" placeholder="••••••••">
      <i class="fa-solid fa-eye toggle-password" onclick="toggleView('re-password', this)"></i>
    </div>

    <button class="btn-action" onclick="handleSubmit()" id="submitBtn">Đăng Nhập</button>

    <div class="footer-text">
      <span id="hint-text">Chưa có tài khoản?</span> 
      <a href="javascript:void(0)" onclick="toggleMode()" id="toggle-link">Đăng ký ngay</a>
    </div>
  </div>
</div>

<script>
  let isLogin = true;

  // Chức năng hiện/ẩn mật khẩu cho từng ô
  function toggleView(inputId, icon) {
    const input = document.getElementById(inputId);
    const isPassword = input.getAttribute('type') === 'password';
    input.setAttribute('type', isPassword ? 'text' : 'password');
    icon.classList.toggle('fa-eye');
    icon.classList.toggle('fa-eye-slash');
  }

  // Chuyển đổi chế độ Đăng nhập/Đăng ký
  function toggleMode() {
    isLogin = !isLogin;
    const title = document.getElementById('form-title');
    const submitBtn = document.getElementById('submitBtn');
    const hintText = document.getElementById('hint-text');
    const toggleLink = document.getElementById('toggle-link');
    const rePassGroup = document.getElementById('re-password-group');

    if (isLogin) {
      title.innerText = "Đăng Nhập";
      submitBtn.innerText = "Đăng Nhập";
      hintText.innerText = "Chưa có tài khoản?";
      toggleLink.innerText = "Đăng ký ngay";
      rePassGroup.style.display = "none";
    } else {
      title.innerText = "Đăng Ký";
      submitBtn.innerText = "Tạo Tài Khoản";
      hintText.innerText = "Đã có tài khoản?";
      toggleLink.innerText = "Đăng nhập ngay";
      rePassGroup.style.display = "block";
    }
  }

  function handleSubmit() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    const rePass = document.getElementById('re-password').value;

    if (!user || !pass) {
      alert("Vui lòng nhập đầy đủ thông tin!");
      return;
    }

    if (!isLogin) {
      // Kiểm tra mật khẩu khớp nhau khi đăng ký
      if (pass !== rePass) {
        alert("Mật khẩu nhập lại không khớp!");
        return;
      }
      alert("Đăng ký thành công!");
      toggleMode();
    } else {
      // Chuyển hướng sang trang kết quả
      window.location.href = "ketqua.html";
    }
  }
</script>

</body>
</html>
