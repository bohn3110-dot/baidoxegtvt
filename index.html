<!DOCTYPE html>
<html>
<head>
  <title>Smart Parking - Login/Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { background-color: #0d1117; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', Tahoma, Verdana, sans-serif; margin: 0; }
    .container { background: #161b22; padding: 40px; border-radius: 12px; width: 350px; color: #c9d1d9; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
    h2 { margin-bottom: 25px; color: #ffffff; font-size: 28px; }
    input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #238636; color: white; border: none; cursor: pointer; border-radius: 6px; font-weight: bold; margin-top: 15px; }
    button:hover { background: #2ea043; }
    .switch { margin-top: 20px; font-size: 14px; }
    a { color: #58a6ff; text-decoration: none; cursor: pointer; }
  </style>
</head>
<body>

<div class="container">
  <h2 id="form-title">Login</h2>
  
  <input type="text" id="username" placeholder="Username (Ví dụ: name123)">
  <input type="password" id="password" placeholder="Password">
  
  <input type="password" id="confirmPassword" placeholder="Confirm Password" style="display:none;">
  
  <button id="main-btn" onclick="handleAuth()">Login</button>
  
  <div class="switch">
    <span id="switch-text">New here?</span> 
    <a onclick="toggleMode()" id="switch-link">Create account</a>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA_H5GWTB-ZQyu4eWssy0p7Rx9pRax74Z0",
    authDomain: "baidoxegtvt.firebaseapp.com",
    projectId: "baidoxegtvt",
    storageBucket: "baidoxegtvt.firebasestorage.app",
    messagingSenderId: "992816518326",
    appId: "1:992816518326:web:cc3484a57e13be15a78217",
    measurementId: "G-Z2NQYFLM34"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Mặc định là true để khớp với HTML ở trên
  let isLogin = true; 

  window.toggleMode = function() {
    isLogin = !isLogin;
    document.getElementById("form-title").innerText = isLogin ? "Login" : "Register";
    document.getElementById("main-btn").innerText = isLogin ? "Login" : "Register";
    document.getElementById("switch-text").innerText = isLogin ? "New here?" : "Already have an account?";
    document.getElementById("switch-link").innerText = isLogin ? "Create account" : "Login here";
    document.getElementById("confirmPassword").style.display = isLogin ? "none" : "block";
  }

  window.handleAuth = async function() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;
    const email = user + "@smart.com";

    try {
      if (isLogin) {
        await signInWithEmailAndPassword(auth, email, pass);
        alert("Chào mừng " + user + " trở lại!");
      } else {
        const confirmPass = document.getElementById("confirmPassword").value;
        if (pass !== confirmPass) {
            alert("Mật khẩu xác nhận không khớp!");
            return;
        }
        await createUserWithEmailAndPassword(auth, email, pass);
        alert("Tài khoản " + user + " đã được tạo!");
      }
      // Chuyển sang trang kết quả
      window.location.href = "ketqua.html"; 
    } catch (err) {
      alert("Lỗi: " + err.message);
    }
  }
</script>
</body>
</html>
