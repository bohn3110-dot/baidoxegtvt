<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ Thống Bãi Đỗ Xe Thông Minh</title>
  <style>
    body { 
      margin: 0; padding: 0; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background: #f0f2f5; color: #1c1e21; 
      display: flex; justify-content: center; 
      min-height: 100vh; 
    }
    .container { width: 95%; max-width: 1100px; margin: 30px 0; }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 { 
      font-size: 36px; text-transform: uppercase; 
      background: linear-gradient(to right, #0561da, #1f6feb); 
      background-clip: text; -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; margin: 0; 
    }
    .header p { color: #65676b; font-weight: 500; margin-top: 10px; }
    .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
    .card { 
      background: #ffffff; border-radius: 15px; 
      padding: 25px 15px; border: 1px solid #dddfe2; 
      text-align: center; transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
    }
    .card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
    .card h3 { font-size: 11px; color: #65676b; text-transform: uppercase; margin: 0 0 15px 0; letter-spacing: 1.2px; }
    .card-value { font-size: 32px; font-weight: 800; }
    .green-card { border-top: 5px solid #238636; }
    .red-card { border-top: 5px solid #d0312d; }
    .yellow-card { border-top: 5px solid #bc8b1a; }
    .blue-card { border-top: 5px solid #1f6feb; }
    .status-open { color: #1a7f37; font-size: 22px !important; }
    .status-closed { color: #d12420; font-size: 22px !important; }
    .layout { 
      background: #ffffff; border-radius: 20px; 
      padding: 40px; border: 1px solid #dddfe2; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    .layout-title { margin-top: 0; color: #0561da; font-size: 20px; margin-bottom: 25px; display: flex; align-items: center; }
    .layout-title::before { content: ""; width: 4px; height: 20px; background: #0561da; margin-right: 10px; border-radius: 2px; }
    .slots { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
    .slot { 
      aspect-ratio: 1.1/1; border-radius: 15px; 
      display: flex; flex-direction: column; 
      justify-content: center; align-items: center; 
      font-weight: 700; border: 3px dashed #e4e6eb; 
      background: #f8f9fa; transition: all 0.4s ease; 
      color: #8b949e;
    }
    .slot.available { border-style: solid; border-color: #238636; color: #1a7f37; background: #f6fff8; }
    .slot.occupied { border-style: solid; border-color: #d0312d; color: #d12420; background: #fff5f5; }
    .slot span { font-size: 16px; }
    .slot small { font-size: 12px; text-transform: uppercase; margin-top: 8px; font-weight: 500; }
    @media (max-width: 768px) {
      .dashboard { grid-template-columns: repeat(2, 1fr); }
      .slots { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Hệ Thống Bãi Đỗ Xe Thông Minh</h1>
    <p id="time-status">Đang kết nối dữ liệu Firebase...</p>
  </div>

  <div class="dashboard">
    <div class="card green-card">
        <h3>Còn Trống</h3>
        <div id="available" class="card-value" style="color: #1a7f37;">0</div>
    </div>
    <div class="card red-card">
        <h3>Đã Có Xe</h3>
        <div id="occupied" class="card-value" style="color: #d12420;">0</div>
    </div>
    <div class="card yellow-card">
        <h3>Cổng Vào (RFID)</h3>
        <div id="gateIn" class="card-value status-closed">ĐANG ĐÓNG</div>
    </div>
    <div class="card blue-card">
        <h3>Cổng Ra (IR)</h3>
        <div id="gateOut" class="card-value status-closed">ĐANG ĐÓNG</div>
    </div>
  </div>

  <div class="layout">
    <h3 class="layout-title">Sơ đồ vị trí đỗ xe trực tuyến</h3>
    <div class="slots">
      <div id="slot1" class="slot"><span>VỊ TRÍ 1</span><small>-</small></div>
      <div id="slot2" class="slot"><span>VỊ TRÍ 2</span><small>-</small></div>
      <div id="slot3" class="slot"><span>VỊ TRÍ 3</span><small>-</small></div>
      <div id="slot4" class="slot"><span>VỊ TRÍ 4</span><small>-</small></div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // Cấu hình đã cập nhật theo apiKey mới nhất của bạn
  const firebaseConfig = {
    apiKey: "AIzaSyA_H5GWTB-ZQyu4eWssy0p7Rx9pRax74Z0",
    authDomain: "baidoxegtvt.firebaseapp.com",
    databaseURL: "https://baidoxegtvt-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "baidoxegtvt",
    storageBucket: "baidoxegtvt.firebasestorage.app",
    messagingSenderId: "992816518326",
    appId: "1:992816518326:web:cc3484a57e13be15a78217"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  onValue(ref(db, 'parking'), (snapshot) => {
    const data = snapshot.val();
    if (!data) return;

    // Cập nhật thời gian
    document.getElementById("time-status").innerText = "Cập nhật lúc: " + new Date().toLocaleTimeString();

    // 1. Cập nhật số lượng chỗ trống/đầy
    const emptyCount = data.empty !== undefined ? data.empty : 0;
    document.getElementById("available").innerText = emptyCount;
    document.getElementById("occupied").innerText = 4 - emptyCount;

    // 2. Trạng thái Cổng Vào
    const gateInEl = document.getElementById("gateIn");
    if (data.gateInStatus == 1) {
      gateInEl.innerText = "ĐANG MỞ";
      gateInEl.className = "card-value status-open";
    } else {
      gateInEl.innerText = "ĐANG ĐÓNG";
      gateInEl.className = "card-value status-closed";
    }

    // 3. Trạng thái Cổng Ra
    const gateOutEl = document.getElementById("gateOut");
    if (data.gateOutStatus == 1) {
      gateOutEl.innerText = "ĐANG MỞ";
      gateOutEl.className = "card-value status-open";
    } else {
      gateOutEl.innerText = "ĐANG ĐÓNG";
      gateOutEl.className = "card-value status-closed";
    }

    // 4. Trạng thái 4 vị trí đỗ (S1, S2, S3, S4)
    for (let i = 1; i <= 4; i++) {
      const isOccupied = data[`s${i}`]; // Nhận giá trị true hoặc false từ Firebase
      const slotEl = document.getElementById(`slot${i}`);
      
      if (slotEl) {
        if (isOccupied === true) {
          slotEl.className = "slot occupied";
          slotEl.querySelector('small').innerText = "Đã có xe";
        } else {
          slotEl.className = "slot available";
          slotEl.querySelector('small').innerText = "Còn trống";
        }
      }
    }
  }, (error) => {
    console.error("Lỗi Firebase:", error);
    document.getElementById("time-status").innerText = "❌ Lỗi kết nối! Kiểm tra cấu hình.";
  });
</script>
</body>
</html>
