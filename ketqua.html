<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ Thống Bãi Đỗ Xe Thông Minh</title>
  <style>
    body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; display: flex; justify-content: center; min-height: 100vh; }
    .container { width: 95%; max-width: 1100px; margin: 30px 0; }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 { font-size: 36px; text-transform: uppercase; background: linear-gradient(to right, #fff, #58a6ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
    
    /* Dashboard 4 cột */
    .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
    .card { background: #161b22; border-radius: 12px; padding: 20px; border: 1px solid #30363d; text-align: center; transition: transform 0.2s; }
    .card:hover { transform: translateY(-5px); }
    .card h3 { font-size: 11px; color: #8b949e; text-transform: uppercase; margin: 0 0 10px 0; letter-spacing: 1px; }
    .card-value { font-size: 40px; font-weight: 800; transition: all 0.3s; }
    
    /* Màu sắc Card */
    .green-card { border-top: 4px solid #238636; }
    .red-card { border-top: 4px solid #da3633; }
    .yellow-card { border-top: 4px solid #d29922; }
    .blue-card { border-top: 4px solid #1f6feb; }

    /* Trạng thái cổng */
    .status-open { color: #3be953; text-shadow: 0 0 10px rgba(59, 233, 83, 0.3); }
    .status-closed { color: #f85149; text-shadow: 0 0 10px rgba(248, 81, 73, 0.3); }

    .layout { background: #161b22; border-radius: 15px; padding: 30px; border: 1px solid #30363d; }
    .slots { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
    .slot { aspect-ratio: 1.2/1; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: 700; border: 3px solid #30363d; background: rgba(255,255,255,0.02); transition: all 0.4s ease; }
    
    .slot.available { border-color: #238636; color: #3be953; }
    .slot.occupied { border-color: #da3633; color: #f85149; background: rgba(218, 54, 51, 0.1); }
    .slot small { font-size: 11px; text-transform: uppercase; margin-top: 5px; opacity: 0.8; }

    @media (max-width: 768px) {
      .dashboard { grid-template-columns: repeat(2, 1fr); }
      .slots { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Hệ Thống Bãi Đỗ Xe Thông Minh</h1>
    <p style="color: #8b949e;">Giám sát Cổng Ra/Vào & Vị trí đỗ theo thời gian thực</p>
  </div>

  <div class="dashboard">
    <div class="card green-card">
        <h3>Còn Trống</h3>
        <div id="available" class="card-value" style="color: #3be953;">0</div>
    </div>
    <div class="card red-card">
        <h3>Đã Có Xe</h3>
        <div id="occupied" class="card-value" style="color: #f85149;">0</div>
    </div>
    <div class="card yellow-card">
        <h3>Cổng Vào</h3>
        <div id="gateIn" class="card-value status-closed" style="font-size: 24px;">ĐANG ĐÓNG</div>
    </div>
    <div class="card blue-card">
        <h3>Cổng Ra</h3>
        <div id="gateOut" class="card-value status-closed" style="font-size: 24px;">ĐANG ĐÓNG</div>
    </div>
  </div>

  <div class="layout">
    <h3 style="margin-top:0; color: #58a6ff;">Sơ đồ bãi đỗ xe</h3>
    <div class="slots">
      <div id="s1" class="slot"><span>VỊ TRÍ 1</span><small>-</small></div>
      <div id="s2" class="slot"><span>VỊ TRÍ 2</span><small>-</small></div>
      <div id="s3" class="slot"><span>VỊ TRÍ 3</span><small>-</small></div>
      <div id="s4" class="slot"><span>VỊ TRÍ 4</span><small>-</small></div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // Cấu hình Firebase
  const firebaseConfig = { 
      databaseURL: "https://baidoxegtvt-default-rtdb.asia-southeast1.firebasedatabase.app" 
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  onValue(ref(db, 'parking'), (snapshot) => {
    const data = snapshot.val();
    if (!data) return;

    // 1. Cập nhật số lượng chỗ trống/đầy
    const emptyCount = data.empty || 0;
    document.getElementById("available").innerText = emptyCount;
    document.getElementById("occupied").innerText = 4 - emptyCount;

    // 2. Cập nhật Cổng Vào (Entry)
    const gateInEl = document.getElementById("gateIn");
    if (data.gateInStatus == 1) {
      gateInEl.innerText = "ĐANG MỞ";
      gateInEl.className = "card-value status-open";
    } else {
      gateInEl.innerText = "ĐANG ĐÓNG";
      gateInEl.className = "card-value status-closed";
    }

    // 3. Cập nhật Cổng Ra (Exit)
    const gateOutEl = document.getElementById("gateOut");
    if (data.gateOutStatus == 1) {
      gateOutEl.innerText = "ĐANG MỞ";
      gateOutEl.className = "card-value status-open";
    } else {
      gateOutEl.innerText = "ĐANG ĐÓNG";
      gateOutEl.className = "card-value status-closed";
    }

    // 4. Cập nhật chi tiết từng Slot
    for (let i = 1; i <= 4; i++) {
      const isOccupied = data[`s${i}`];
      const el = document.getElementById(`s${i}`);
      if (el) {
        el.className = `slot ${isOccupied ? 'occupied' : 'available'}`;
        el.querySelector('small').innerText = isOccupied ? "Có xe" : "Trống";
      }
    }
  });
</script>
</body>
</html>
